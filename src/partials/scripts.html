<script>
function toggleNav(btn){
  const m = document.getElementById('menu');
  const open = m.classList.toggle('open');
  btn.setAttribute('aria-expanded', open);
}
if ('IntersectionObserver' in window) {
  document.documentElement.classList.add('anim');
  const io = new IntersectionObserver(es => es.forEach(e => {
    if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
  }), { threshold: .15, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('.reveal').forEach(el => {
    const sibs = [...el.parentElement.children].filter(c => c.classList.contains('reveal'));
    el.style.setProperty('--stagger', Math.min(sibs.indexOf(el), 5));
    io.observe(el);
  });
  // animated stat counters
  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const cio = new IntersectionObserver(es => es.forEach(e => {
    if (!e.isIntersecting) return;
    cio.unobserve(e.target);
    const el = e.target, target = parseInt(el.dataset.count, 10);
    if (reduced) { el.textContent = target; return; }
    const t0 = performance.now(), dur = 1200;
    const tick = (t) => {
      const p = Math.min((t - t0) / dur, 1);
      el.textContent = Math.round(target * (1 - Math.pow(1 - p, 3)));
      if (p < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }), { threshold: .4 });
  document.querySelectorAll('[data-count]').forEach(el => cio.observe(el));
}
// testimonials carousel (scroll-snap + arrows + dots)
(function(){
  const track = document.querySelector('.testi-track');
  if (!track) return;
  const items = [...track.querySelectorAll('.testi-item')];
  const dotsBox = document.querySelector('.t-dots');
  const prev = document.querySelector('.t-prev');
  const next = document.querySelector('.t-next');
  const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
  function go(i){
    i = Math.max(0, Math.min(i, items.length - 1));
    const it = items[i];
    track.scrollTo({ left: it.offsetLeft - (track.clientWidth - it.clientWidth) / 2, behavior: reduced ? 'auto' : 'smooth' });
  }
  items.forEach((_, i) => {
    const d = document.createElement('button');
    d.className = 't-dot'; d.setAttribute('aria-label', 'Go to testimonial ' + (i + 1));
    d.addEventListener('click', () => go(i));
    dotsBox.appendChild(d);
  });
  const dots = [...dotsBox.children];
  let cur = 0;
  function sync(){
    const mid = track.scrollLeft + track.clientWidth / 2;
    cur = items.reduce((best, it, i) =>
      Math.abs(it.offsetLeft + it.clientWidth / 2 - mid) <
      Math.abs(items[best].offsetLeft + items[best].clientWidth / 2 - mid) ? i : best, 0);
    dots.forEach((d, i) => d.classList.toggle('on', i === cur));
    prev.disabled = cur === 0;
    next.disabled = cur === items.length - 1;
  }
  track.addEventListener('scroll', () => requestAnimationFrame(sync), { passive: true });
  prev.addEventListener('click', () => go(cur - 1));
  next.addEventListener('click', () => go(cur + 1));
  sync();
})();
</script>
